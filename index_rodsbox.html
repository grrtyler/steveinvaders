<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROD'S BOX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#111;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    height:100vh; overflow:hidden;
    font-family:'Oswald',sans-serif;
    user-select:none;
  }
  #game-wrapper { position:relative; width:620px; max-width:100vw; }

  #title-bar {
    text-align:center; padding:5px 0 3px;
    background:#cc0000; border:3px solid #ff4444; border-bottom:none; letter-spacing:5px;
  }
  #title-bar h1 { font-family:'Black Ops One',cursive; font-size:1.8rem; color:#fff; text-shadow:3px 3px 0 #880000,0 0 18px #ff6600; }
  #title-bar .sub { font-size:0.6rem; color:#ffdd00; letter-spacing:4px; text-transform:uppercase; }

  #scene {
    position:relative; width:100%; height:520px;
    overflow:hidden; cursor:pointer;
    border-left:3px solid #ff4444; border-right:3px solid #ff4444;
    background:#000;
  }

  #bg {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    object-position:50% 50%;
  }

  /*
    Rod PNG: 434x576. Eyes at ~row 225 = 39.1% from top.
    Target: eyes at y=210px in 520px-tall scene.
    Calculated: height=509px, width=384px.
    Rod is bottom-anchored, right side, overlapping the toolbox.
  */
  #rod-wrap {
    position:absolute;
    right: -20px;
    bottom: 0px;
    width: 470px;
    height: 624px;
  }

  #rod-body {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:fill;
  }

  /* Shoulder pivot: 75.3% x, 45.6% y of PNG */
  #rod-arm {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:fill;
    transform-origin: 75.3% 45.6%;
    transform: rotate(0deg);
  }

  .sparkle {
    position:absolute; pointer-events:none; z-index:10;
    font-size:1.3rem;
    animation:pop 0.9s ease-out forwards;
  }
  @keyframes pop {
    0%   { opacity:1; transform:scale(0.3) translateY(0); }
    100% { opacity:0; transform:scale(1.6) translateY(-65px); }
  }
  .sweat {
    position:absolute; pointer-events:none; z-index:10;
    font-size:0.9rem;
    animation:drip 0.8s ease-in forwards;
  }
  @keyframes drip {
    0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(30px)}
  }


  #comment-box {
    background:rgba(0,0,0,0.88); border:2px solid #ffdd00; border-radius:4px;
    padding:5px 14px; position:absolute; top:12px; left:50%; transform:translateX(-50%);
    white-space:nowrap; font-size:0.85rem; color:#ffdd00; letter-spacing:1px;
    text-transform:uppercase; opacity:0; transition:opacity 0.3s;
    pointer-events:none; z-index:20;
  }
  #comment-box.show { opacity:1; }

  #hud {
    background:linear-gradient(180deg,#1a1a1a,#0d0d0d);
    border:3px solid #ff4444; border-top:none;
    padding:8px 16px; display:flex; align-items:center; gap:16px;
  }
  .hud-block { flex:1; text-align:center; }
  .hud-label { font-size:0.55rem; letter-spacing:3px; color:#888; text-transform:uppercase; }
  .hud-value { font-family:'Black Ops One',cursive; font-size:1.5rem; }
  #scrub-count { color:#ffdd00; text-shadow:0 0 8px #ffdd00; }
  #clean-pct   { color:#00ff88; text-shadow:0 0 8px #00ff88; }
  #timer-val   { color:#88aaff; text-shadow:0 0 8px #88aaff; }
  #clean-bar-wrap { height:7px; background:#333; border-radius:4px; margin-top:3px; overflow:hidden; }
  #clean-bar { height:100%; background:linear-gradient(90deg,#00cc66,#00ff88); animation:shimmer 1.5s linear infinite; }
  @keyframes shimmer { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.5)} }

  #controls { text-align:center; font-size:0.55rem; letter-spacing:3px; color:#555; padding:3px; background:#0d0d0d; }
  #controls span { color:#888; }

  /* ROD'S SPEECH BUBBLE */
  #rod-bubble {
    position:absolute;
    left: 22px;
    top: 55px;
    max-width: 230px;
    background: #fffde7;
    border: 3.5px solid #111;
    border-radius: 18px 18px 18px 4px;
    padding: 10px 14px;
    font-family: 'Black Ops One', cursive;
    font-size: 0.78rem;
    color: #111;
    line-height: 1.35;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 30;
    box-shadow: 3px 4px 0 #111;
    transform: rotate(-2deg) scale(0);
    transform-origin: bottom right;
    opacity: 0;
    transition: none;
  }
  #rod-bubble.pop {
    animation: bubblePop 4.4s cubic-bezier(0.22,1.4,0.36,1) forwards;
  }
  /* Tail pointing toward Rod (bottom-right) */
  #rod-bubble::after {
    content: '';
    position: absolute;
    bottom: -18px;
    right: 22px;
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 6px solid transparent;
    border-top: 18px solid #fffde7;
    filter: drop-shadow(2px 3px 0 #111);
    z-index: 1;
  }
  #rod-bubble::before {
    content: '';
    position: absolute;
    bottom: -22px;
    right: 20px;
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 8px solid transparent;
    border-top: 22px solid #111;
  }
  @keyframes bubblePop {
    0%   { opacity:1; transform: rotate(-2deg) scale(0); }
    8%   { opacity:1; transform: rotate(-2deg) scale(1.08); }
    14%  { opacity:1; transform: rotate(-2deg) scale(0.96); }
    20%  { opacity:1; transform: rotate(-2deg) scale(1.02); }
    25%  { opacity:1; transform: rotate(-2deg) scale(1); }
    82%  { opacity:1; transform: rotate(-2deg) scale(1); }
    100% { opacity:0; transform: rotate(-2deg) scale(0.85); }
  }
</style>
</head>

    </div>

    <div id="comment-box">The box was already clean, Rod.</div>
    <div id="rod-bubble"></div>
  </div>

  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">Scrubs</div>
      <div class="hud-value" id="scrub-count">0</div>
    </div>
    <div class="hud-block" style="flex:2">
      <div class="hud-label">Cleanliness</div>
      <div class="hud-value" id="clean-pct">100%</div>
      <div id="clean-bar-wrap"><div id="clean-bar"></div></div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Time</div>
      <div class="hud-value" id="timer-val">0:00</div>
    </div>
  </div>
  <div id="controls"><span>CLICK / TAP</span> to wipe &nbsp;|&nbsp; <span>SPACE</span> for power scrub</div>
</div>

<script>
  const armEl      = document.getElementById('rod-arm');
  const scene      = document.getElementById('scene');
  const commentBox = document.getElementById('comment-box');
  const rodBubble  = document.getElementById('rod-bubble');
  const scrubEl    = document.getElementById('scrub-count');
  const timerEl    = document.getElementById('timer-val');

  const ROD_SAYS = [
    "That's enough\ndag blame-it!",
    "Timmy stay away\nfrom my box!",
    "Swap it out,\nLarry!",
    "I'll show you\nwhere to put it!",
    "Laaarrrryyy!",
    "These young guys don't\nknow how to keep\ntheir toolbox clean!",
    "Tyler, why haven't\nyou ordered\nmy parts yet?",
    "I'm going to\nCountry Oven!",
    "See y'all later.\nMe and Tyler are\ngoing fishing at Dart!",
    "Ronnie, do you have\nany 44788 filters\non your truck?",
    "My camper is\nthis clean too!",
  ];
  let rodBubbleTimeout, rodDeck = [], rodDeckIdx = 0;

  function shuffleDeck() {
    rodDeck = [...Array(ROD_SAYS.length).keys()];
    for (let i = rodDeck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [rodDeck[i], rodDeck[j]] = [rodDeck[j], rodDeck[i]];
    }
    rodDeckIdx = 0;
  }
  shuffleDeck();

  function showRodBubble() {
    if (rodDeckIdx >= rodDeck.length) shuffleDeck();
    const idx = rodDeck[rodDeckIdx++];
    const tilt = (Math.random() * 6 - 3).toFixed(1);
    rodBubble.style.transform = `rotate(${tilt}deg) scale(0)`;
    rodBubble.classList.remove('pop');
    void rodBubble.offsetWidth;
    rodBubble.textContent = ROD_SAYS[idx];
    rodBubble.classList.add('pop');
    clearTimeout(rodBubbleTimeout);
    rodBubbleTimeout = setTimeout(() => rodBubble.classList.remove('pop'), 4800);
  }

  let angle = 0, velocity = 0;
  const STIFFNESS = 280, DAMPING = 8.5;
  function kick(power) { velocity -= power * 420; }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min((now - last) / 1000, 0.033);
    last = now;
    const accel = -STIFFNESS * angle - DAMPING * velocity;
    velocity += accel * dt;
    angle    += velocity * dt;
    if (angle > 8) { angle = 8; velocity *= -0.3; }
    armEl.style.transform = `rotate(${angle}deg)`;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  let scrubs = 0, commentTimeout, startTime = Date.now();
  const COMMENTS = [
    "Already spotless!","Still perfect...","Can't get cleaner!",
    "Why are you still cleaning?","Literally gleaming.","Rod, please stop.",
    "It's ALREADY CLEAN.","Zero grime detected.","The box is fine, Rod.",
    "Snap-on certified spotless.","Medical grade clean.","Rod. ROD. It's clean.",
    "This is unnecessary.","Cleaner than a hospital.","You're a maniac, Rod.",
    "No dirt was found.","Stop. Please.","It was clean in 1994.",
    "NASA levels of clean.","Go home, Rod.","Your knees must hurt.",
    "The box is scared.","Technically a mirror now.","Rod has a problem.",
  ];

  function showComment(t) {
    commentBox.textContent = t;
    commentBox.classList.add('show');
    clearTimeout(commentTimeout);
    commentTimeout = setTimeout(() => commentBox.classList.remove('show'), 2500);
  }

  const EMOJIS = ['✨','⭐','💫','🌟','✦'];
  function spawnSparkle() {
    const el = document.createElement('div');
    el.className = 'sparkle';
    el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    el.style.left = (60 + Math.random() * 320) + 'px';
    el.style.top  = (190 + Math.random() * 60) + 'px';
    scene.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  function spawnSweat() {
    const el = document.createElement('div');
    el.className = 'sweat'; el.textContent = '💦';
    el.style.left = (490 + Math.random() * 25) + 'px';
    el.style.top  = (115 + Math.random() * 35) + 'px';
    scene.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  function doScrub(power) {
    power = power || 1;
    kick(power);
    scrubs++;
    scrubEl.textContent = scrubs;
    for (let i = 0; i < 4; i++) setTimeout(spawnSparkle, i * 65);
    spawnSweat();
    if (scrubs % 3 === 0) showComment(COMMENTS[Math.floor(Math.random() * COMMENTS.length)]);
    if (scrubs % 5 === 0) showRodBubble();
    const M = {10:"10 scrubs. The box is confused.",25:"25 scrubs. Rod is committed.",
      50:"50 SCRUBS. Are you okay?",100:"100 SCRUBS. Rod is a legend.",
      200:"200 SCRUBS. Send help.",500:"500 SCRUBS. ROD IS UNSTOPPABLE."};
    if (M[scrubs]) showComment(M[scrubs]);
  }

  scene.addEventListener('click', () => doScrub(1));
  scene.addEventListener('touchstart', e => { e.preventDefault(); doScrub(1); }, {passive:false});
  document.addEventListener('keydown', e => { if(e.code==='Space'){e.preventDefault(); doScrub(1.5);} });

  setInterval(spawnSweat, 2500);
  setInterval(spawnSparkle, 1200);
  setInterval(() => {
    const s = Math.floor((Date.now()-startTime)/1000);
    timerEl.textContent = Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  }, 1000);

  setTimeout(() => showComment("The box was already clean, Rod."), 1800);
</script>
