<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STEVE INVADERS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; font-family: 'Press Start 2P', monospace; overflow-y: auto; padding-bottom: 40px; padding-top: 20px; }
  /* Leaderboard */
  #lb-section { width: 700px; margin-top: 80px; }
  #lb-table-wrap { max-height: 320px; overflow-y: auto; border: 1px solid #222; border-radius: 4px; }
  #lb-table-wrap::-webkit-scrollbar { width: 6px; }
  #lb-table-wrap::-webkit-scrollbar-track { background: #111; }
  #lb-table-wrap::-webkit-scrollbar-thumb { background: #ff3333; border-radius: 3px; }
  #lb-heading { color: #ff3333; font-size: 16px; text-align: center; text-shadow: 0 0 16px #ff0000; letter-spacing: 3px; margin-bottom: 18px; }
  #lb-submit-form { display: none; background: #0a0a0a; border: 2px solid #ff3333; border-radius: 6px; padding: 20px; margin-bottom: 20px; text-align: center; }
  #lb-submit-form .lb-game-over { color: #ff9944; font-size: 10px; margin-bottom: 6px; }
  #lb-submit-form .lb-final { color: #fff; font-size: 13px; margin-bottom: 16px; }
  #lb-name-row { display: flex; gap: 10px; justify-content: center; }
  #lb-name-input { background: #111; border: 2px solid #ff3333; color: #fff; font-family: 'Press Start 2P', monospace; font-size: 10px; padding: 8px 12px; border-radius: 4px; outline: none; width: 200px; text-transform: uppercase; }
  #lb-name-input::placeholder { color: #555; }
  #lb-save-btn { background: #ff3333; color: #fff; border: none; font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
  #lb-save-btn:hover { background: #ff5555; }
  #lb-saved-msg { color: #44ff88; font-size: 8px; margin-top: 10px; display: none; }
  #lb-table { width: 100%; border-collapse: collapse; }
  #lb-table thead tr { border-bottom: 2px solid #ff3333; }
  #lb-table th { color: #ff3333; font-size: 9px; padding: 8px 12px; text-align: left; letter-spacing: 1px; }
  #lb-table th:last-child { text-align: right; }
  #lb-table td { padding: 9px 12px; font-size: 8px; border-bottom: 1px solid #1a1a1a; }
  #lb-table td:last-child { text-align: right; }
  .lb-row-1 { color: #ffd700; }
  .lb-row-2 { color: #c0c0c0; }
  .lb-row-3 { color: #cd7f32; }
  .lb-row-n { color: #888; }
  .lb-medal { font-size: 14px; }
  #lb-empty { color: #444; font-size: 8px; text-align: center; padding: 30px 0; }
  #title { color: #ff3333; font-size: 24px; text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000; margin-bottom: 8px; letter-spacing: 4px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
  #score-bar { display: flex; gap: 50px; color: #fff; font-size: 10px; margin-bottom: 6px; }
  #canvas { border: 2px solid #222; display: block; }
  #overlay { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; pointer-events: none; }
  #msg { color: #ff3333; font-size: 20px; text-align: center; text-shadow: 0 0 20px #ff0000; }
  #sub { color: #aaa; font-size: 9px; text-align: center; line-height: 2.2; }
  #lives-bar { color: #ff6600; font-size: 10px; margin-top: 5px; }

</style>
</head>
<body>
<div id="title">⭐ STEVE INVADERS ⭐</div>
<div id="score-bar">
  <span>SCORE: <span id="scoreVal">0</span></span>
  <span>HI: <span id="hiVal">0</span></span>
  <span>LEVEL: <span id="levelVal">1</span></span>
</div>
<div style="position:relative">
  <canvas id="canvas" width="700" height="520"></canvas>
  <div id="overlay">
    <div id="msg">STEVE INVADERS</div>
    <div id="sub">← → MOVE &nbsp;&nbsp; SPACE SHOOT<br>PRESS SPACE TO START</div>
  </div>
</div>
<div id="lives-bar">LIVES: <span id="livesVal">❤❤❤</span></div>

<!-- LEADERBOARD -->
<div id="lb-section">
  <div id="lb-heading">🏆 LEADERBOARD 🏆</div>

  <!-- Score submission form (shown after game over) -->
  <div id="lb-submit-form">
    <div class="lb-game-over">GAME OVER</div>
    <div class="lb-final">YOUR SCORE: <span id="lb-final-score">0</span></div>
    <div id="lb-name-row">
      <input id="lb-name-input" maxlength="12" placeholder="ENTER NAME" />
      <button id="lb-save-btn">SUBMIT</button>
    </div>
    <div id="lb-saved-msg">✓ SCORE SAVED!</div>
  </div>

  <!-- Scores table -->
  <div id="lb-table-wrap">
  <table id="lb-table">
    <thead>
      <tr>
        <th>RANK</th>
        <th>NAME</th>
        <th>SCORE</th>
      </tr>
    </thead>
    <tbody id="lb-tbody">
      <tr><td colspan="3"><div id="lb-empty">NO SCORES YET — BE THE FIRST!</div></td></tr>
    </tbody>
  </table>
  </div>
</div>

let score = 0, hi = 0, level = 1, lives = 3;
let gameState = 'start';
let keys = {};
let frame = 0;

// Player - Steve is tall, so make hitbox just his body center
const player = { x: 310, y: 400, w: 72, h: 110, speed: 5 };

// Bullets
let bullets = [], alienBullets = [], lastShot = 0;
const SHOOT_COOLDOWN = 320;

// Aliens
let aliens = [], alienDir = 1, alienMoveTimer = 0, alienSpeed = 0.5;
const ALIEN_COLS = 8, ALIEN_ROWS = 3;
const AW = 80, AH = 58; // alien draw size

// UFO bonus
let ufo = null, ufoTimer = 0;
// Explosions
let explosions = [];

function initAliens() {
  aliens = [];
  for (let r = 0; r < ALIEN_ROWS; r++) {
    for (let c = 0; c < ALIEN_COLS; c++) {
      aliens.push({
        x: 30 + c * 82, y: 18 + r * 68,
        w: AW, h: AH, alive: true,
        flash: 0
      });
    }
  }
  alienSpeed = 0.38 + level * 0.13;
}

function resetGame(newGame) {
  bullets = []; alienBullets = []; explosions = [];
  player.x = 310; ufo = null; ufoTimer = 0;
  if (newGame) { score = 0; lives = 3; level = 1; }
  initAliens();
  alienDir = 1; alienMoveTimer = 0;
  gameState = 'playing';
  overlay.style.display = 'none';
  updateUI();
}

function updateUI() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('hiVal').textContent = hi;
  document.getElementById('levelVal').textContent = level;
  document.getElementById('livesVal').textContent = '❤'.repeat(Math.max(0,lives));
}

function showOverlay(msg, sub) {
  msgEl.textContent = msg;
  subEl.innerHTML = sub;
  overlay.style.display = 'flex';
}

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameState === 'start' || gameState === 'gameover') resetGame(true);
    else if (gameState === 'win' || gameState === 'dead') resetGame(false);
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
let touchX = null;
canvas.addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX;
  e.preventDefault();
  if (gameState !== 'playing') { resetGame(gameState === 'start' || gameState === 'gameover'); }
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  if (touchX !== null) {
    const rect = canvas.getBoundingClientRect();
    const tx = (e.touches[0].clientX - rect.left) * (W / rect.width);
    player.x = Math.max(0, Math.min(W - player.w, tx - player.w/2));
  }
  e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchend', e => {
  if (gameState === 'playing') {
    const now = Date.now();
    if (now - lastShot > SHOOT_COOLDOWN) { shoot(); lastShot = now; }
  }
  e.preventDefault();
}, {passive:false});

function shoot() {
  // Two laser beams from eyes area
  const ex = player.x + player.w / 2;
  const ey = player.y + player.h * 0.18;
  bullets.push({ x: ex - 8, y: ey, w: 5, h: 22, speed: 12 });
  bullets.push({ x: ex + 3, y: ey, w: 5, h: 22, speed: 12 });
}

let lastAlienShot = 0;

function alienShoot() {
  const live = aliens.filter(a => a.alive);
  if (!live.length) return;
  const s = live[Math.floor(Math.random() * live.length)];
  alienBullets.push({ x: s.x + s.w/2 - 3, y: s.y + s.h, w: 7, h: 18, speed: 3.2 + level * 0.35 });
}

function spawnExplosion(x, y) {
  const particles = [];
  for (let i = 0; i < 14; i++) {
    const angle = (Math.PI * 2 / 14) * i;
    const speed = 1.5 + Math.random() * 2.5;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1.0, color: ['#ff4400','#ffaa00','#ffffff','#ff6600'][Math.floor(Math.random()*4)] });
  }
  explosions.push({ particles, life: 1.0 });
}

function update() {
  if (gameState !== 'playing') return;
  frame++;

  // Player move
  if (keys['ArrowLeft'] || keys['KeyA']) player.x = Math.max(0, player.x - player.speed);
  if (keys['ArrowRight'] || keys['KeyD']) player.x = Math.min(W - player.w, player.x + player.speed);

  const now = Date.now();
  if (keys['Space'] && now - lastShot > SHOOT_COOLDOWN) { shoot(); lastShot = now; }

  // Alien movement
  alienMoveTimer++;
  const liveAliens = aliens.filter(a => a.alive);
  const moveInterval = Math.max(2, 15 - liveAliens.length * 0.35);
  if (alienMoveTimer >= moveInterval) {
    alienMoveTimer = 0;
    let hitEdge = false;
    const speed = alienSpeed + (ALIEN_COLS*ALIEN_ROWS - liveAliens.length) * 0.09;
    for (const a of liveAliens) {
      a.x += alienDir * speed;
      if (a.x <= 0 || a.x + a.w >= W) hitEdge = true;
    }
    if (hitEdge) { alienDir *= -1; for (const a of aliens) a.y += 22; }
  }

  // UFO
  ufoTimer++;
  if (!ufo && ufoTimer > 350 + Math.random()*400) {
    ufo = { x: -120, y: 8, w: 120, h: 70, speed: 2.8 };
    ufoTimer = 0;
  }
  if (ufo) { ufo.x += ufo.speed; if (ufo.x > W + 120) ufo = null; }

  // Alien shoot
  if (now - lastAlienShot > Math.max(400, 1500 - level*120)) { alienShoot(); lastAlienShot = now; }

  // Move bullets
  bullets = bullets.filter(b => b.y > -b.h);
  for (const b of bullets) b.y -= b.speed;
  alienBullets = alienBullets.filter(b => b.y < H);
  for (const b of alienBullets) b.y += b.speed;

  // Update explosions
  for (const exp of explosions) {
    exp.life -= 0.04;
    for (const p of exp.particles) { p.x += p.vx; p.y += p.vy; p.life -= 0.05; }
  }
  explosions = explosions.filter(e => e.life > 0);

  // Bullet vs aliens
  for (const b of bullets) {
    for (const a of aliens) {
      if (!a.alive) continue;
      if (b.x < a.x+a.w && b.x+b.w > a.x && b.y < a.y+a.h && b.y+b.h > a.y) {
        a.alive = false; b.y = -999;
        spawnExplosion(a.x + a.w/2, a.y + a.h/2);
        score += 10; hi = Math.max(hi, score); updateUI();
      }
    }
    if (ufo && b.x < ufo.x+ufo.w && b.x+b.w > ufo.x && b.y < ufo.y+ufo.h && b.y+b.h > ufo.y) {
      spawnExplosion(ufo.x + ufo.w/2, ufo.y + ufo.h/2);
      b.y = -999; score += 100; hi = Math.max(hi, score); ufo = null; updateUI();
    }
  }

  // Alien bullets vs player - use tighter hitbox (body center)
  const hx = player.x + player.w*0.2, hy = player.y + player.h*0.15;
  const hw = player.w*0.6, hh = player.h*0.7;
  for (const b of alienBullets) {
    if (b.x < hx+hw && b.x+b.w > hx && b.y < hy+hh && b.y+b.h > hy) {
      b.y = H+999; lives--; updateUI();
      spawnExplosion(player.x + player.w/2, player.y + player.h/2);
      if (lives <= 0) { gameState = 'gameover'; showOverlay('GAME OVER', 'PRESS SPACE TO PLAY AGAIN'); if (score > 0) setTimeout(() => lbShowForm(score), 400); }
      else { gameState = 'dead'; showOverlay('STEVE GOT HIT! 🚀', lives + ' LIVES LEFT<br><br>PRESS SPACE TO CONTINUE'); }
      return;
    }
  }

  // Aliens reach Steve
  for (const a of aliens) {
    if (a.alive && a.y + a.h >= player.y + 20) {
      gameState = 'gameover'; showOverlay('THEY INVADED!', 'PRESS SPACE TO PLAY AGAIN'); if (score > 0) setTimeout(() => lbShowForm(score), 400); return;
    }
  }

  if (aliens.every(a => !a.alive)) {
    level++; gameState = 'win';
    showOverlay('WAVE CLEARED! 🎉', 'LEVEL ' + level + '<br><br>PRESS SPACE TO CONTINUE');
    updateUI();
  }
}

// Starfield
const stars = Array.from({length: 120}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.4+0.3, b: Math.random(), speed: Math.random()*0.3+0.1
}));

function drawStars() {
  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${0.25 + s.b*0.75})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    s.y += s.speed; if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
  }
}

function drawPlayer() {
  if (!steveImg.complete || !steveImg.naturalWidth) return;
  // Draw Steve - scale to fit player bounds nicely
  const aspect = steveImg.naturalWidth / steveImg.naturalHeight;
  const drawH = player.h + 30;
  const drawW = drawH * aspect;
  const dx = player.x + player.w/2 - drawW/2;
  const dy = player.y + player.h - drawH + 10;
  ctx.drawImage(steveImg, dx, dy, drawW, drawH);

  // Red laser glow on eyes when shooting
  if (bullets.length > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const eyeY = dy + drawH * 0.42;
    const eyeX = dx + drawW * 0.5;
    const grad = ctx.createRadialGradient(eyeX, eyeY, 0, eyeX, eyeY, 18);
    grad.addColorStop(0, 'rgba(255,50,0,0.9)');
    grad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(eyeX, eyeY, 18, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawAliens() {
  if (!alienImg.complete || !alienImg.naturalWidth) return;
  for (const a of aliens) {
    if (!a.alive) continue;
    // Subtle hover bob
    const bob = Math.sin(frame * 0.06 + a.x * 0.05) * 2;
    ctx.save();
    // Subtle saucer glow
    ctx.shadowColor = '#ffcc33';
    ctx.shadowBlur = 10;
    ctx.drawImage(alienImg, a.x, a.y + bob, a.w, a.h);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawUFO() {
  if (!ufo) return;
  ctx.save();
  const cx = ufo.x + ufo.w/2;
  const cy = ufo.y + ufo.h/2;
  const mw = ufo.w;   // ~100
  const mh = ufo.h;   // ~38 — use full height for mushroom

  // === MUSHROOM ===
  // --- Stem ---
  const stemW = mw * 0.36;
  const stemH = mh * 0.52;
  const stemX = cx - stemW/2;
  const stemY = cy + mh*0.08;

  // Stem base gradient (tan/cream)
  const stemGrad = ctx.createLinearGradient(stemX, stemY, stemX + stemW, stemY);
  stemGrad.addColorStop(0,   '#c8a96e');
  stemGrad.addColorStop(0.3, '#f0d9a0');
  stemGrad.addColorStop(0.7, '#e8cc88');
  stemGrad.addColorStop(1,   '#b89050');
  ctx.fillStyle = stemGrad;
  // Slightly rounded rect for stem
  ctx.beginPath();
  ctx.roundRect(stemX, stemY, stemW, stemH, [4, 4, 6, 6]);
  ctx.fill();
  // Stem highlight stripe
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(stemX + stemW*0.2, stemY + 3, stemW*0.18, stemH - 6);

  // --- Cap ---
  const capRx = mw * 0.52;
  const capRy = mh * 0.54;
  const capCy = cy - mh * 0.18;

  // Cap shadow beneath
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 4;

  // Cap base color - red with radial gradient
  const capGrad = ctx.createRadialGradient(cx - capRx*0.2, capCy - capRy*0.3, capRy*0.05, cx, capCy, capRx);
  capGrad.addColorStop(0,   '#ff6644');
  capGrad.addColorStop(0.4, '#ee2211');
  capGrad.addColorStop(0.8, '#cc1100');
  capGrad.addColorStop(1,   '#880800');
  ctx.fillStyle = capGrad;
  ctx.beginPath();
  ctx.ellipse(cx, capCy, capRx, capRy, 0, Math.PI, 0); // top half only
  ctx.lineTo(cx + capRx, capCy + capRy*0.15);
  ctx.ellipse(cx, capCy + capRy*0.15, capRx, capRy*0.18, 0, 0, Math.PI);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // Cap underside (gills) - cream color
  ctx.fillStyle = '#f5e8c0';
  ctx.beginPath();
  ctx.ellipse(cx, capCy + capRy*0.15, capRx, capRy*0.18, 0, 0, Math.PI);
  ctx.fill();
  // Gill lines
  ctx.strokeStyle = '#d4c090';
  ctx.lineWidth = 0.8;
  for (let i = -3; i <= 3; i++) {
    const gx = cx + i * capRx/3.5;
    ctx.beginPath();
    ctx.moveTo(gx, capCy + capRy*0.05);
    ctx.lineTo(gx, capCy + capRy*0.32);
    ctx.stroke();
  }

  // White spots on cap
  const spots = [
    { ox: -0.28, oy: -0.25, r: 0.11 },
    { ox:  0.25, oy: -0.32, r: 0.10 },
    { ox:  0.05, oy: -0.55, r: 0.09 },
    { ox: -0.45, oy: -0.05, r: 0.08 },
    { ox:  0.42, oy: -0.08, r: 0.07 },
  ];
  for (const s of spots) {
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.shadowColor = 'rgba(255,255,255,0.4)';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.ellipse(cx + s.ox*capRx, capCy + s.oy*capRy, s.r*capRx, s.r*capRy*0.85, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Cap shine
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.ellipse(cx - capRx*0.22, capCy - capRy*0.42, capRx*0.28, capRy*0.18, -0.4, 0, Math.PI*2);
  ctx.fill();

  // 100pts label
  ctx.fillStyle = '#ffee00';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 3;
  ctx.fillText('100pts', cx, stemY + stemH + 10);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawBullets() {
  for (const b of bullets) {
    // Red laser beam
    const grad = ctx.createLinearGradient(b.x, b.y+b.h, b.x, b.y);
    grad.addColorStop(0, '#ff2200');
    grad.addColorStop(0.5, '#ff6644');
    grad.addColorStop(1, '#ffffff');
    ctx.fillStyle = grad;
    ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 10;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
  }
  for (const b of alienBullets) {
    ctx.fillStyle = '#aaff00';
    ctx.shadowColor = '#88ff00'; ctx.shadowBlur = 8;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
  }
}

function drawExplosions() {
  for (const exp of explosions) {
    for (const p of exp.particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  ctx.globalAlpha = 1;
}

function drawGround() {
  for (let bx = 0; bx < W; bx += 20) {
    ctx.fillStyle = '#22aa22';
    ctx.fillRect(bx, H-10, 20, 10);
    ctx.fillStyle = '#44cc44';
    ctx.fillRect(bx+2, H-10, 16, 4);
  }
}

function draw() {
  ctx.fillStyle = '#00000f';
  ctx.fillRect(0, 0, W, H);
  drawStars();
  drawUFO();
  drawAliens();
  drawPlayer();
  drawBullets();
  drawExplosions();
  drawGround();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
showOverlay('STEVE INVADERS', '← → MOVE &nbsp;&nbsp; SPACE SHOOT<br>PRESS SPACE TO START');
loop();

// ===================== LEADERBOARD =====================
const LB_API = '/api/leaderboard';
let lbScores = [];
let lbPollTimer = null;

async function lbLoad() {
  try {
    const res = await fetch(LB_API);
    if (res.ok) lbScores = await res.json();
  } catch(e) { /* keep existing scores on network error */ }
  lbRender();
}

async function lbSave(name, sc) {
  try {
    const res = await fetch(LB_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, score: sc })
    });
    if (res.ok) lbScores = await res.json();
  } catch(e) { /* keep existing scores on network error */ }
  lbRender();
}

// Poll every 5 seconds so all players see live updates
function lbStartPolling() {
  if (lbPollTimer) return;
  lbPollTimer = setInterval(lbLoad, 5000);
}

function lbRender() {
  const tbody = document.getElementById('lb-tbody');
  if (!lbScores.length) {
    tbody.innerHTML = '<tr><td colspan="3"><div id="lb-empty">NO SCORES YET — BE THE FIRST!</div></td></tr>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  const rowClass = ['lb-row-1','lb-row-2','lb-row-3'];
  tbody.innerHTML = lbScores.map((e, i) => {
    const cls = i < 3 ? rowClass[i] : 'lb-row-n';
    const rank = i < 3 ? `<span class="lb-medal">${medals[i]}</span>` : `#${i+1}`;
    return `<tr class="${cls}"><td>${rank}</td><td>${e.name}</td><td>${e.score}</td></tr>`;
  }).join('');
}

function lbShowForm(sc) {
  const form = document.getElementById('lb-submit-form');
  document.getElementById('lb-final-score').textContent = sc;
  document.getElementById('lb-saved-msg').style.display = 'none';
  document.getElementById('lb-name-input').value = '';
  document.getElementById('lb-save-btn').disabled = false;
  form.style.display = 'block';
  // Scroll down so player sees the form
  setTimeout(() => form.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
}

document.getElementById('lb-save-btn').addEventListener('click', async () => {
  const name = document.getElementById('lb-name-input').value;
  const sc = parseInt(document.getElementById('lb-final-score').textContent) || 0;
  document.getElementById('lb-save-btn').disabled = true;
  await lbSave(name, sc);
  document.getElementById('lb-saved-msg').style.display = 'block';
  setTimeout(() => { document.getElementById('lb-submit-form').style.display = 'none'; }, 2000);
});

document.getElementById('lb-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('lb-save-btn').click();
  e.stopPropagation();
});

// Load scores on page load and start live polling
lbLoad();
lbStartPolling();
// ======================================================

</script>
